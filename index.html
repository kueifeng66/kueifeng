<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="icon" href="favicon.png" type="image/png"> -->
    <link id="favicon" rel="icon" href="favicon1.ico" type="image/x-icon">
    <title>Last Updated: 2024-11-28</title>
    <style>
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
        button {
            position: fixed;
            bottom: 20px; /* Adjust for better reachability */
            right: 20px;
            padding: 15px;
            background-color: #007BFF; /* Highlight button for visibility */
            color: white;
            border: none;
            border-radius: 50%;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            font-size: 16px;
        }
        button:active {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <iframe id="website-frame" src="site1/index.html"></iframe>
    <button onclick="switchWebsite()">⇄</button> <!-- Icon instead of text for simplicity -->
    <script>
        let currentSite = 'site1';

        function switchWebsite() {
            const frame = document.getElementById('website-frame');
            const favicon = document.getElementById('favicon');
            // currentSite = currentSite === 'site1' ? 'site2' : 'site1';
            if (currentSite === 'site1') {
                currentSite = 'site2';
                frame.src = 'site2/index.html';
                favicon.href = 'favicon2.ico'; // Change to site2's favicon
            } else {
                currentSite = 'site1';
                frame.src = 'site1/index.html';
                favicon.href = 'favicon1.ico'; // Change back to site1's favicon
            }
            frame.src = `${currentSite}/index.html`;
        }
    </script>
</body>
</html>
