<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Duty Calendar</title>
	<style>
        html {
                font-size: 62.5%; /* 1rem = 10px */
             }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h2 {
            color: #007BFF;
            font-size: 5rem;
            margin-bottom: 2rem;
        }
        input {
            width: 30rem;  /* Set width of input fields */
            padding: 1.5rem;  /* Increase padding for larger input */
            font-size: 2.2rem;  /* Increase font size */
            margin: 1rem 0;  /* Add margin between input fields */
            border: 0.2rem solid #ccc;
            border-radius: 0.5rem;
        }
        button {
            width: 32rem;  /* Set width of the button */
            padding: 1.5rem;  /* Increase padding for larger button */
            font-size: 4rem;  /* Increase font size */
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-login {
            font-size: 4rem;
            font-weight: bold;
            padding: 1.5rem 5rem;
            color: white;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            position: relative;
            background: linear-gradient(145deg, #007BFF, #0056b3);
            box-shadow: 0.2rem 0.2rem 0 #004494, 0.3rem 0.3rem 0.5rem #555;
            transition: all 0.2s ease-in-out;
        }

        .btn-login::before {
            content: "";
            position: absolute;
            top: 0rem;
            left: 0rem;
            right: 0rem;
            bottom: 0rem;
            background: linear-gradient(145deg, #008CFF, #0049A0);
            border-radius: 1rem;
            z-index: -1;
            box-shadow: inset 0rem 0rem 0.5rem rgba(255, 255, 255, 0.7);
        }

        .btn-login:hover {
            transform: translateY(-0.1rem);
        }

        .btn-login:active {
            transform: translateY(0.1rem);
            box-shadow: 0.1rem 0.1rem 0 #004494, 0.2rem 0.2rem 0.5rem rgba(0, 0, 0, 0.2);
        }


    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
          from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

           const firebaseConfig = {
                    apiKey: "AIzaSyB09LglfIXHfUGUWI5cFRzQvyz8D90dlGc",
                    authDomain: "on-duty-calenadar.firebaseapp.com",
                    projectId: "on-duty-calenadar",
                    storageBucket: "on-duty-calenadar.firebasestorage.app",
                    messagingSenderId: "1048788052024",
                    appId: "1:1048788052024:web:ea80ce1666c99ebc429ecd",
                    measurementId: "G-CHLW1GSW19"
                };

        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("login").addEventListener("click", () => {
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                signInWithEmailAndPassword(auth, email, password)
                    .then(() => {
                        //alert("Login successful!");
                        window.location.href = "index.html"; // Redirect to main page
                    })
                    .catch(error => alert("Please Enter Valid Email and Password"));
            });

        });

    </script>
</head>
<body>
    <h2>On Duty Calendar</h2>
    <input type="email" id="email" placeholder="Enter email">
    <input type="password" id="password" placeholder="Enter password">
    <button class="btn-login" id="login">Submit</button>
    
    <div id="notification" style="
    background-color: #FFF3CD; 
    padding: 2rem; 
    font-size: 2.5rem; 
    font-weight: bold; 
    border: 0.3rem solid #FFB86F; 
    border-radius: 1.5rem;
    text-align: center;
    margin-top: 5rem;
    width: 38rem;  
    line-height: 4rem; 
    color: #805300; ">
    ⚠️ <br>若有需要使用此班表程式者<br>，請洽桃園區臺洪柜峰申請<br>，謝謝。TEL：03-3985081<br>⚠️
</div>
</body>
</html>
