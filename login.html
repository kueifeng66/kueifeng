<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
	<style>
        html {
                font-size: 62.5%; /* 1rem = 10px */
             }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h2 {
            font-size: 5rem;
            margin-bottom: 2rem;
        }
        input {
            width: 30rem;  /* Set width of input fields */
            padding: 1.5rem;  /* Increase padding for larger input */
            font-size: 2.2rem;  /* Increase font size */
            margin: 1rem 0;  /* Add margin between input fields */
            border: 0.2rem solid #ccc;
            border-radius: 0.5rem;
        }
        button {
            width: 32rem;  /* Set width of the button */
            padding: 1.5rem;  /* Increase padding for larger button */
            font-size: 4rem;  /* Increase font size */
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:active {
            background-color: #0056b3;
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
          from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

           const firebaseConfig = {
                    apiKey: "AIzaSyB09LglfIXHfUGUWI5cFRzQvyz8D90dlGc",
                    authDomain: "on-duty-calenadar.firebaseapp.com",
                    projectId: "on-duty-calenadar",
                    storageBucket: "on-duty-calenadar.firebasestorage.app",
                    messagingSenderId: "1048788052024",
                    appId: "1:1048788052024:web:ea80ce1666c99ebc429ecd",
                    measurementId: "G-CHLW1GSW19"
                };

        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("login").addEventListener("click", () => {
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                signInWithEmailAndPassword(auth, email, password)
                    .then(() => {
                        alert("Login successful!");
                        window.location.href = "index.html"; // Redirect to main page
                    })
                    .catch(error => alert(error.message));
            });

        });

    </script>
</head>
<body>
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Enter email">
    <input type="password" id="password" placeholder="Enter password">
    <button id="login">Login</button>
</body>
</html>
